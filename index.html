<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aihua Xie - Personal Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 90%;
            text-align: center;
            padding: 40px 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #a0a0c0;
            margin-bottom: 32px;
        }

        .bio {
            font-size: 1rem;
            line-height: 1.8;
            color: #c0c0d0;
            margin-bottom: 36px;
            padding: 0 20px;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .links a.github {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .links a.github:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 1.2rem;
            color: #8888aa;
            margin: 40px 0 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .skill-tag {
            padding: 6px 16px;
            border-radius: 16px;
            background: rgba(102, 126, 234, 0.15);
            color: #a0b0ff;
            font-size: 0.85rem;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #555577;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">A</div>
        <h1>Aihua Xie</h1>
        <p class="subtitle">Welcome to my personal page</p>

        <div class="bio">
            <p>Hi, I'm Aihua Xie. I'm passionate about technology and learning new things.</p>
            <p style="margin-top: 12px;">This page is under construction. More content coming soon!</p>
        </div>

        <div class="links">
            <a href="https://github.com/phireli2000-tech" class="github" target="_blank">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

                </svg>
                GitHub
            </a>
        </div>

        <p class="section-title">More to come</p>

        <footer>
            <p>&copy; 2026 Aihua Xie. Built with ❤️</p>
        </footer>
    </div>
</body>
</html>
